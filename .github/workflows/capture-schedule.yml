name: Capture ADP schedule and upload to Google Drive

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules run in UTC. This is 5:17 AM Vancouver during daylight time.
    - cron: "17 12 * * *"

permissions:
  contents: read

concurrency:
  group: adp-schedule-capture
  cancel-in-progress: false

jobs:
  capture-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb for headed Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Write Gmail OAuth files from secrets
        env:
          GOOGLE_CREDENTIALS_JSON_B64: ${{ secrets.GOOGLE_CREDENTIALS_JSON_B64 }}
          GOOGLE_TOKEN_JSON_B64: ${{ secrets.GOOGLE_TOKEN_JSON_B64 }}
        run: |
          mkdir -p .secrets
          if [ -n "$GOOGLE_CREDENTIALS_JSON_B64" ]; then
            echo "$GOOGLE_CREDENTIALS_JSON_B64" | base64 --decode > .secrets/gmail_credentials.json
          fi
          if [ -n "$GOOGLE_TOKEN_JSON_B64" ]; then
            echo "$GOOGLE_TOKEN_JSON_B64" | base64 --decode > .secrets/gmail_token.json
          fi
          chmod 600 .secrets/gmail_*.json 2>/dev/null || true

      - name: Validate Gmail OAuth token
        env:
          GOOGLE_CREDENTIALS_JSON_B64: ${{ secrets.GOOGLE_CREDENTIALS_JSON_B64 }}
          GOOGLE_TOKEN_JSON_B64: ${{ secrets.GOOGLE_TOKEN_JSON_B64 }}
          GOOGLE_CREDENTIALS_PATH: .secrets/gmail_credentials.json
          GOOGLE_TOKEN_PATH: .secrets/gmail_token.json
          GOOGLE_REQUIRE_REFRESH_TOKEN: "true"
        run: |
          if [ -z "$GOOGLE_CREDENTIALS_JSON_B64" ] || [ -z "$GOOGLE_TOKEN_JSON_B64" ]; then
            echo "Skipping Gmail OAuth validation because one or both Gmail OAuth secrets are missing."
            exit 0
          fi
          npm run gmail:check

      - name: Check ADP credential inputs
        env:
          ADP_USERNAME: ${{ secrets.ADP_USERNAME }}
          ADP_PASSWORD: ${{ secrets.ADP_PASSWORD }}
          ADP_USERNAME_B64: ${{ secrets.ADP_USERNAME_B64 }}
          ADP_PASSWORD_B64: ${{ secrets.ADP_PASSWORD_B64 }}
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import os

          def decode_optional_b64(name):
              raw = os.environ.get(name, '')
              if not raw:
                  return ''
              return base64.b64decode(''.join(raw.split()), validate=True).decode('utf-8')

          username = decode_optional_b64('ADP_USERNAME_B64') or os.environ.get('ADP_USERNAME', '')
          password = decode_optional_b64('ADP_PASSWORD_B64') or os.environ.get('ADP_PASSWORD', '')

          print('ADP_USERNAME available:', bool(username))
          print('ADP_PASSWORD available:', bool(password))
          print('ADP_USERNAME source:', 'ADP_USERNAME_B64' if os.environ.get('ADP_USERNAME_B64') else 'ADP_USERNAME')
          print('ADP_PASSWORD source:', 'ADP_PASSWORD_B64' if os.environ.get('ADP_PASSWORD_B64') else 'ADP_PASSWORD')
          print('ADP_USERNAME length:', len(username))
          print('ADP_PASSWORD length:', len(password))
          print('ADP_USERNAME sha256 prefix:', hashlib.sha256(username.encode('utf-8')).hexdigest()[:16] if username else '')
          print('ADP_PASSWORD sha256 prefix:', hashlib.sha256(password.encode('utf-8')).hexdigest()[:16] if password else '')
          PY

      - name: Capture and parse schedules
        env:
          # Prefer the *_B64 secrets when present. The JS script decodes them
          # directly from process.env, so special characters never pass through
          # shell echo/heredoc dotenv generation.
          ADP_USERNAME_B64: ${{ secrets.ADP_USERNAME_B64 }}
          ADP_PASSWORD_B64: ${{ secrets.ADP_PASSWORD_B64 }}
          ADP_USERNAME: ${{ secrets.ADP_USERNAME }}
          ADP_PASSWORD: ${{ secrets.ADP_PASSWORD }}
          ADP_URL: https://my.adp.com/#/time
          ADP_WORK_FEATURES_URL: https://my.adp.com/#/time/myworkfeatures
          # Keep this matching the local successful run. A headed browser
          # needs xvfb-run on GitHub Actions because there is no real display.
          ADP_HEADLESS: "false"
          ADP_NONINTERACTIVE: "true"
          ADP_INCOGNITO: "true"
          TZ: America/Vancouver
          ADP_TIMEZONE_ID: America/Vancouver
          ADP_LOCALE: en-CA
          ADP_WINDOW_WIDTH: "1600"
          ADP_WINDOW_HEIGHT: "1000"
          ADP_SELECT_ALL_JOBS: "true"
          ADP_FILTER_DELAY_MS: "700"
          ADP_WEEKS_TO_CAPTURE: "4"
          ADP_SCROLL_DELAY_MS: "500"
          ADP_NEXT_WEEK_DELAY_MS: "1500"
          ADP_NEXT_WEEK_TIMEOUT_MS: "45000"
          ADP_POST_LOGIN_TIMEOUT_MS: "120000"
          ADP_DEBUG: "true"
          ADP_TRACE: "true"
          GOOGLE_CREDENTIALS_JSON_B64: ${{ secrets.GOOGLE_CREDENTIALS_JSON_B64 }}
          GOOGLE_TOKEN_JSON_B64: ${{ secrets.GOOGLE_TOKEN_JSON_B64 }}
          GOOGLE_CREDENTIALS_PATH: .secrets/gmail_credentials.json
          GOOGLE_TOKEN_PATH: .secrets/gmail_token.json
          GOOGLE_REQUIRE_REFRESH_TOKEN: "true"
          CALENDAR_TIMEZONE: America/Vancouver
          CALENDAR_ALARMS: 1440,180,60
          CALENDAR_REFRESH_MINUTES: "60"
        run: |
          if [ "${ADP_HEADLESS}" = "false" ]; then
            echo "Running headed Chromium under xvfb-run to match local headed/incognito conditions."
            xvfb-run -a --server-args="-screen 0 ${ADP_WINDOW_WIDTH:-1600}x${ADP_WINDOW_HEIGHT:-1000}x24" node adp_schedule_auto.js
          else
            echo "Running headless Chromium."
            node adp_schedule_auto.js
          fi

      - name: Upload parsed schedule outputs to Google Drive
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          # Recommended for normal personal My Drive folders. These make uploads
          # owned by your Google account instead of a service account with no quota.
          GOOGLE_DRIVE_CREDENTIALS_JSON_B64: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS_JSON_B64 }}
          GOOGLE_DRIVE_TOKEN_JSON_B64: ${{ secrets.GOOGLE_DRIVE_TOKEN_JSON_B64 }}
          # Fallback only for real Google Shared Drives, not normal shared My Drive folders.
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          python3 scripts/upload_to_drive.py \
            --source-dir parsed_schedule \
            --folder-id "$GOOGLE_DRIVE_FOLDER_ID"

      - name: Build subscribable calendar website files
        env:
          CALENDAR_BASE_URL: https://ritchiek.tech/adp-calendars
        run: |
          python3 scripts/build_calendar_site.py \
            --source-dir parsed_schedule \
            --out-dir calendar_site \
            --base-url "$CALENDAR_BASE_URL"

      - name: Check out website repository
        uses: actions/checkout@v6
        with:
          repository: SuperRitchie/SuperRitchie.github.io
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website

      - name: Publish subscribable calendars to ritchiek.tech
        env:
          CALENDAR_WEBSITE_SUBDIR: adp-calendars
        run: |
          set -euo pipefail
          rm -rf "website/$CALENDAR_WEBSITE_SUBDIR"
          mkdir -p "website/$CALENDAR_WEBSITE_SUBDIR"
          cp -R calendar_site/. "website/$CALENDAR_WEBSITE_SUBDIR/"

          git -C website config user.name "github-actions[bot]"
          git -C website config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C website add "$CALENDAR_WEBSITE_SUBDIR"

          if git -C website diff --cached --quiet; then
            echo "No website calendar changes to publish."
          else
            git -C website commit -m "Update ADP schedule calendars"
            git -C website push
          fi

      - name: Upload debug artifacts if the run fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: adp-debug-artifacts
          path: |
            captures/*.debug.json
            captures/*.metadata.json
            captures/*.png
            captures/*.html
            captures/*.visible_text.txt
            captures/latest_visible_text.txt
            captures/trace_*.zip
            parsed_schedule/parse_summary.json
          if-no-files-found: ignore
          retention-days: 3
