name: Capture ADP schedule and upload to Google Drive

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules run in UTC. This is 5:17 AM Vancouver during daylight time.
    - cron: "17 12 * * *"

permissions:
  contents: read

concurrency:
  group: adp-schedule-capture
  cancel-in-progress: false

jobs:
  capture-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Create .env for this run safely
        shell: bash
        env:
          ADP_USERNAME_B64_SECRET: ${{ secrets.ADP_USERNAME_B64 }}
          ADP_PASSWORD_B64_SECRET: ${{ secrets.ADP_PASSWORD_B64 }}
        run: |
          python3 - <<'PY'
          import base64
          import binascii
          import json
          import os
          from pathlib import Path

          def decode_required_b64(env_name: str) -> str:
              raw = os.environ.get(env_name, "")
              if not raw:
                  raise SystemExit(f"Missing required GitHub secret: {env_name.replace('_SECRET', '')}")

              # Allow copy/pasted base64 with line wrapping or spaces.
              compact = "".join(raw.split())
              try:
                  decoded = base64.b64decode(compact, validate=True)
              except binascii.Error as exc:
                  raise SystemExit(f"{env_name.replace('_SECRET', '')} is not valid base64: {exc}") from exc

              try:
                  return decoded.decode("utf-8")
              except UnicodeDecodeError as exc:
                  raise SystemExit(f"{env_name.replace('_SECRET', '')} did not decode as UTF-8 text") from exc

          adp_username = decode_required_b64("ADP_USERNAME_B64_SECRET")
          adp_password = decode_required_b64("ADP_PASSWORD_B64_SECRET")

          values = {
              "ADP_URL": "https://my.adp.com/#/time",
              "ADP_WORK_FEATURES_URL": "https://my.adp.com/#/time/myworkfeatures",
              "ADP_USERNAME": adp_username,
              "ADP_PASSWORD": adp_password,
              "ADP_HEADLESS": "true",
              "ADP_INCOGNITO": "true",
              "ADP_SELECT_ALL_JOBS": "true",
              "ADP_FILTER_DELAY_MS": "700",
              "ADP_WEEKS_TO_CAPTURE": "4",
              "ADP_SCROLL_DELAY_MS": "500",
              "ADP_NEXT_WEEK_DELAY_MS": "1500",
              "ADP_NEXT_WEEK_TIMEOUT_MS": "45000",
              "ADP_POST_LOGIN_TIMEOUT_MS": "120000",
              "ADP_DEBUG": "true",
              "ADP_TRACE": "true",
              "CALENDAR_TIMEZONE": "America/Vancouver",
              "CALENDAR_ALARMS": "1440,180,60",
          }

          def dotenv_quote(value: str) -> str:
              # dotenv supports double-quoted values. JSON escaping safely preserves
              # $, #, quotes, backslashes, spaces, and other shell-sensitive chars.
              return json.dumps(str(value))

          lines = [f"{key}={dotenv_quote(value)}" for key, value in values.items()]
          Path(".env").write_text("\n".join(lines) + "\n", encoding="utf-8")

          print("Created .env safely from base64-encoded GitHub secrets.")
          print("ADP_USERNAME_B64 present:", bool(os.environ.get("ADP_USERNAME_B64_SECRET")))
          print("ADP_PASSWORD_B64 present:", bool(os.environ.get("ADP_PASSWORD_B64_SECRET")))
          print("Decoded ADP_USERNAME length:", len(values["ADP_USERNAME"]))
          print("Decoded ADP_PASSWORD length:", len(values["ADP_PASSWORD"]))
          PY

      - name: Capture and parse schedules
        run: node adp_schedule_auto.js

      - name: Decode Google service account credentials
        shell: bash
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          mkdir -p .secrets
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          encoded = os.environ["GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON_B64"]
          Path(".secrets/google-service-account.json").write_bytes(base64.b64decode(encoded))
          print("Decoded Google service account credentials.")
          PY

      - name: Upload parsed schedule outputs to Google Drive
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python3 scripts/upload_to_drive.py \
            --source-dir parsed_schedule \
            --folder-id "$GOOGLE_DRIVE_FOLDER_ID" \
            --service-account-file .secrets/google-service-account.json

      - name: Upload debug artifacts if the run fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: adp-debug-artifacts
          path: |
            captures/*.debug.json
            captures/*.metadata.json
            captures/*.png
            captures/*.html
            captures/*.visible_text.txt
            captures/latest_visible_text.txt
            captures/trace_*.zip
            parsed_schedule/parse_summary.json
          if-no-files-found: ignore
          retention-days: 3
